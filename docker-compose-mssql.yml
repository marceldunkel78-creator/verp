version: '3.8'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: verp_mssql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Visitron#2026!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./Datenvorlagen:/backup
    networks:
      - verp_network
    restart: unless-stopped

volumes:
  mssql_data:

networks:
  verp_network:
    driver: bridge
